# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-football"
BBFILE_PATTERN_meta-football = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-football = "6"

LAYERDEPENDS_meta-football = "core"
LAYERSERIES_COMPAT_meta-football = "scarthgap"
