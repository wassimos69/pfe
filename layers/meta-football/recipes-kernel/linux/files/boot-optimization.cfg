# Kernel boot optimizations for Raspberry Pi 5

# Reduce kernel logging overhead  
CONFIG_PRINTK_LOG_LEVEL=3
CONFIG_EARLY_PRINTK=n

# Disable debug info to reduce image size
CONFIG_DEBUG_INFO=n
CONFIG_DEBUG_KERNEL=n

# Parallel module loading (safer than serial)
CONFIG_MODULE_AUTOLOAD=y

# Disable unnecessary subsystems
CONFIG_MAGIC_SYSRQ=n
CONFIG_KGDB=n

# Optimize filesystem checks
CONFIG_EXT4_USE_FOR_EXT2=y

# Reduce module load time
CONFIG_MODPROBE_PATH="/sbin/modprobe"
